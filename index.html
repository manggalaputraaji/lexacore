<!DOCTYPE html>
<html lang="id">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body, html { margin: 0; padding: 0; background-color: white; font-family: sans-serif; }
  .hero-section { height: 200vh; position: relative; }
  .sticky-container {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .mask-layer {
    position: absolute;
    inset: 0;
    background-color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    mix-blend-mode: screen;
    transition: opacity 0.6s ease-in-out;
  }
  .final-layer {
    position: absolute;
    inset: 0;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-style {
    font-size: 15vw;
    font-weight: 900;
    font-family: 'Arial Black', sans-serif;
    margin: 0;
    position: relative;
    z-index: 15;
  }
  .text-black { color: black; mix-blend-mode: multiply; }
  .text-white { 
    color: white; 
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .is-scrolled .mask-layer { opacity: 0; }
  .is-scrolled .final-layer { opacity: 1; }
  .content {
    min-height: 100vh;
    background: white;
    padding: 100px 50px;
    position: relative;
    z-index: 20;
    opacity: 0;
    transform: translateY(50px);
    transition: all 1s ease-out;
  }
  .content.reveal {
    opacity: 1;
    transform: translateY(0);
  }
  a { text-decoration: none; color: black; transition: color 0.3s ease; }
  a:hover { color: white;
  text-shadow: 
    -1px -1px 0 #000,  
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000; }
</style>
</head>
<body>

<div class="hero-section" id="mainSection">
    <div class="sticky-container">
        <img src="bg.jpg" class="bg-img">
        <div class="mask-layer">
            <h1 class="text-style text-black">WELCOME </h1>
        </div>
        <div class="final-layer">
            <h1 class="text-style text-white">WELCOME</h1>
        </div>
    </div>
</div>

<div class="content d-flex align-items-center justify-content-center" id="contentSection">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <img src="logolex.png" alt="Logo LEXACORE" class="img-fluid mb-4 mx-auto d-block" style="max-width: 250px;">
            </div>
            <div class="col-md-8 text-center">
                <a href="login.html"><h2><b>ENTER SITE</b></h2></a>
            </div>
        </div> 
    </div> 
</div>
<script>

  window.addEventListener('scroll', () => {
    const section = document.getElementById('mainSection');
    const content = document.getElementById('contentSection');
    const scrollY = window.scrollY;
    const triggerText = window.innerHeight * 0.4; 
    if (scrollY > triggerText) {
      section.classList.add('is-scrolled');
    } else {
      section.classList.remove('is-scrolled');
    }
    const triggerContent = window.innerHeight * 1.5; 
    if (scrollY > triggerContent) {
      content.classList.add('reveal');
    } else {
      content.classList.remove('reveal');
    }
  });

</script>
</script>

</body>
</html>
